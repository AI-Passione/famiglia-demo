name: Deploy Command Center to GH Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Demo Repo
        uses: actions/checkout@v4

      - name: Checkout Core Repo
        uses: actions/checkout@v4
        with:
          # We assume the core repo is in the same organization
          repository: AI-Passione/famiglia-core
          token: ${{ secrets.CORE_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          path: famiglia-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: famiglia-core/src/famiglia_core/command_center/frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          npm ci

      - name: Build Frontend
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          # Set the base path for GitHub Pages subfolder deployment
          export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Deploy to GH Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: famiglia-core/src/famiglia_core/command_center/frontend/dist
          branch: gh-pages
          clean: true
