name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Validate Deployment Config
    uses: ./.github/workflows/verify.yml

  deploy:
    name: Deploy over SSH
    needs: verify
    runs-on: ubuntu-latest
    env:
      # SSH Configuration
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST || vars.HETZNER_HOST }}
      SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER || vars.HETZNER_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.HETZNER_SSH_PRIVATE_KEY }}
      SSH_PRIVATE_KEY_BASE64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 || secrets.HETZNER_SSH_PRIVATE_KEY_BASE64 }}
      SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE || secrets.HETZNER_SSH_PASSPHRASE }}
      
      # Application Secrets (mapped to GitHub Secrets)
      APP_ENV: ${{ secrets.APP_ENV || 'production' }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      OLLAMA_HOST: ${{ secrets.OLLAMA_HOST || 'http://ollama:11434' }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_FALLBACK_MODEL: ${{ secrets.OLLAMA_FALLBACK_MODEL }}
      
      # Slack Configuration
      SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
      SLACK_BOT_TOKEN_SYSTEM: ${{ secrets.SLACK_BOT_TOKEN_SYSTEM }}
      USER_SLACK_ID: ${{ secrets.USER_SLACK_ID }}
      DEV_CHANNEL_ID: ${{ secrets.DEV_CHANNEL_ID }}

      # Agent Tokens - Alfredo
      SLACK_BOT_TOKEN_ALFREDO: ${{ secrets.SLACK_BOT_TOKEN_ALFREDO }}
      SLACK_APP_TOKEN_ALFREDO: ${{ secrets.SLACK_APP_TOKEN_ALFREDO }}

      # Agent Tokens - Vito
      SLACK_BOT_TOKEN_VITO: ${{ secrets.SLACK_BOT_TOKEN_VITO }}
      SLACK_APP_TOKEN_VITO: ${{ secrets.SLACK_APP_TOKEN_VITO }}

      # Agent Tokens - Riccardo
      SLACK_BOT_TOKEN_RICCARDO: ${{ secrets.SLACK_BOT_TOKEN_RICCARDO }}
      SLACK_APP_TOKEN_RICCARDO: ${{ secrets.SLACK_APP_TOKEN_RICCARDO }}
      GITHUB_APP_ID_RICCARDO: ${{ secrets.GITHUB_APP_ID_RICCARDO }}
      GITHUB_APP_INSTALLATION_ID_RICCARDO: ${{ secrets.GITHUB_APP_INSTALLATION_ID_RICCARDO }}
      GITHUB_APP_PRIVATE_KEY_RICCARDO: ${{ secrets.GITHUB_APP_PRIVATE_KEY_RICCARDO }}

      # Agent Tokens - Rossini
      SLACK_BOT_TOKEN_ROSSINI: ${{ secrets.SLACK_BOT_TOKEN_ROSSINI }}
      SLACK_APP_TOKEN_ROSSINI: ${{ secrets.SLACK_APP_TOKEN_ROSSINI }}
      GITHUB_APP_ID_ROSSINI: ${{ secrets.GITHUB_APP_ID_ROSSINI }}
      GITHUB_APP_INSTALLATION_ID_ROSSINI: ${{ secrets.GITHUB_APP_INSTALLATION_ID_ROSSINI }}
      GITHUB_APP_PRIVATE_KEY_ROSSINI: ${{ secrets.GITHUB_APP_PRIVATE_KEY_ROSSINI }}
      NOTION_API_KEY_ROSSINI: ${{ secrets.NOTION_API_KEY_ROSSINI }}

      # Agent Tokens - Tommy
      SLACK_BOT_TOKEN_TOMMY: ${{ secrets.SLACK_BOT_TOKEN_TOMMY }}
      SLACK_APP_TOKEN_TOMMY: ${{ secrets.SLACK_APP_TOKEN_TOMMY }}

      # Agent Tokens - Bella
      SLACK_BOT_TOKEN_BELLA: ${{ secrets.SLACK_BOT_TOKEN_BELLA }}
      SLACK_APP_TOKEN_BELLA: ${{ secrets.SLACK_APP_TOKEN_BELLA }}

      # Agent Tokens - Kowalski
      SLACK_BOT_TOKEN_KOWALSKI: ${{ secrets.SLACK_BOT_TOKEN_KOWALSKI }}
      SLACK_APP_TOKEN_KOWALSKI: ${{ secrets.SLACK_APP_TOKEN_KOWALSKI }}
      NOTION_API_KEY_KOWALSKI: ${{ secrets.NOTION_API_KEY_KOWALSKI }}

    steps:
      - name: Validate SSH configuration
        run: |
          test -n "$SSH_HOST" || {
            echo "::error::Missing SSH host. Set the SSH_HOST secret, or define SSH_HOST/HETZNER_HOST as a repository variable."
            exit 1
          }
          test -n "$SSH_USER" || {
            echo "::error::Missing SSH user. Set the SSH_USER secret, or define SSH_USER/HETZNER_USER as a repository variable."
            exit 1
          }
          test -n "$SSH_PRIVATE_KEY$SSH_PRIVATE_KEY_BASE64" || {
            echo "::error::Missing SSH private key. Set SSH_PRIVATE_KEY or SSH_PRIVATE_KEY_BASE64."
            exit 1
          }

      - name: Prepare SSH Key
        run: |
          if [ -n "$SSH_PRIVATE_KEY_BASE64" ]; then
            {
              echo "DECODED_SSH_KEY<<EOF"
              echo "$SSH_PRIVATE_KEY_BASE64" | tr -d '\r\n\t ' | base64 --decode
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            {
              echo "DECODED_SSH_KEY<<EOF"
              echo "$SSH_PRIVATE_KEY" | tr -d '\r'
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Deploy stack on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.DECODED_SSH_KEY }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT || '22' }}
          envs: >-
            APP_ENV,DB_USER,DB_PASSWORD,DB_NAME,GEMINI_API_KEY,ANTHROPIC_API_KEY,PERPLEXITY_API_KEY,SLACK_APP_TOKEN,SLACK_BOT_TOKEN_SYSTEM,OLLAMA_HOST,OLLAMA_API_KEY,OLLAMA_FALLBACK_MODEL,
            USER_SLACK_ID,DEV_CHANNEL_ID,SLACK_BOT_TOKEN_ALFREDO,SLACK_APP_TOKEN_ALFREDO,SLACK_BOT_TOKEN_VITO,SLACK_APP_TOKEN_VITO,SLACK_BOT_TOKEN_RICCARDO,SLACK_APP_TOKEN_RICCARDO,
            GITHUB_APP_ID_RICCARDO,GITHUB_APP_INSTALLATION_ID_RICCARDO,GITHUB_APP_PRIVATE_KEY_RICCARDO,SLACK_BOT_TOKEN_ROSSINI,SLACK_APP_TOKEN_ROSSINI,GITHUB_APP_ID_ROSSINI,
            GITHUB_APP_INSTALLATION_ID_ROSSINI,GITHUB_APP_PRIVATE_KEY_ROSSINI,NOTION_API_KEY_ROSSINI,SLACK_BOT_TOKEN_TOMMY,SLACK_APP_TOKEN_TOMMY,SLACK_BOT_TOKEN_BELLA,
            SLACK_APP_TOKEN_BELLA,SLACK_BOT_TOKEN_KOWALSKI,SLACK_APP_TOKEN_KOWALSKI,NOTION_API_KEY_KOWALSKI
          script: |
            set -eu

            STACK_ROOT=/opt/famiglia
            DEPLOY_BRANCH=${{ github.ref_name }}
            DEMO_REPO=git@github.com:${{ github.repository }}.git
            CORE_REPO=git@github.com:AI-Passione/famiglia-core.git

            ensure_docker() {
              if ! command -v docker &> /dev/null; then
                echo "Docker not found. Installing..."
                sudo apt-get update && sudo apt-get install -y curl
                curl -fsSL https://get.docker.com | sudo sh
                sudo usermod -aG docker "$(id -un)"
                echo "Docker installed successfully."
              fi
            }

            ensure_uv() {
              if ! command -v uv &> /dev/null; then
                echo "UV not found. Installing..."
                curl -LsSf https://astral.sh/uv/install.sh | sh
                # Add to path for current session if not already there
                if [[ ":$PATH:" != *":$HOME/.local/bin:"* ]]; then
                  export PATH="$HOME/.local/bin:$PATH"
                fi
                echo "UV installed successfully."
              fi
            }

            ensure_repo() {
              REPO_URL="$1"
              REPO_DIR="$2"

              if [ ! -d "$REPO_DIR/.git" ]; then
                git clone "$REPO_URL" "$REPO_DIR"
              fi
            }

            sync_repo() {
              REPO_DIR="$1"

              cd "$REPO_DIR"
              git fetch origin "$DEPLOY_BRANCH"
              git checkout "$DEPLOY_BRANCH" || git checkout -b "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
              git pull --ff-only origin "$DEPLOY_BRANCH"
              cd "$STACK_ROOT"
            }

            sudo mkdir -p "$STACK_ROOT"
            sudo chown -R "$(id -un):$(id -gn)" "$STACK_ROOT"

            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
            chmod 600 ~/.ssh/known_hosts

            cd "$STACK_ROOT"

            ensure_repo "$DEMO_REPO" famiglia-demo
            ensure_repo "$CORE_REPO" famiglia-core

            sync_repo famiglia-demo
            sync_repo famiglia-core

            cd "$STACK_ROOT/famiglia-demo"

            echo "Generating .env from passed environment variables..."
            : > .env
            VARS_TO_SYNC=(
              APP_ENV DB_USER DB_PASSWORD DB_NAME GEMINI_API_KEY ANTHROPIC_API_KEY PERPLEXITY_API_KEY 
              OLLAMA_HOST OLLAMA_API_KEY OLLAMA_FALLBACK_MODEL
              SLACK_APP_TOKEN SLACK_BOT_TOKEN_SYSTEM USER_SLACK_ID DEV_CHANNEL_ID
              SLACK_BOT_TOKEN_ALFREDO SLACK_APP_TOKEN_ALFREDO
              SLACK_BOT_TOKEN_VITO SLACK_APP_TOKEN_VITO
              SLACK_BOT_TOKEN_RICCARDO SLACK_APP_TOKEN_RICCARDO GITHUB_APP_ID_RICCARDO GITHUB_APP_INSTALLATION_ID_RICCARDO GITHUB_APP_PRIVATE_KEY_RICCARDO
              SLACK_BOT_TOKEN_ROSSINI SLACK_APP_TOKEN_ROSSINI GITHUB_APP_ID_ROSSINI GITHUB_APP_INSTALLATION_ID_ROSSINI GITHUB_APP_PRIVATE_KEY_ROSSINI NOTION_API_KEY_ROSSINI
              SLACK_BOT_TOKEN_TOMMY SLACK_APP_TOKEN_TOMMY
              SLACK_BOT_TOKEN_BELLA SLACK_APP_TOKEN_BELLA
              SLACK_BOT_TOKEN_KOWALSKI SLACK_APP_TOKEN_KOWALSKI NOTION_API_KEY_KOWALSKI
            )
            for var in "${VARS_TO_SYNC[@]}"; do
              eval value="\${$var:-}"
              if [ -n "$value" ]; then
                echo "$var=\"$value\"" >> .env
              fi
            done

            chmod 600 .env

            ensure_docker
            ensure_uv

            sudo docker compose pull || true
            sudo docker compose up -d --build --remove-orphans
            sudo docker compose ps
