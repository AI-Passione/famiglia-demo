name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Validate Deployment Config
    uses: ./.github/workflows/verify.yml

  deploy:
    name: Deploy over SSH
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Deploy stack on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -eu

            STACK_ROOT=/opt/famiglia
            DEPLOY_BRANCH=main
            DEMO_REPO=git@github.com:${{ github.repository }}.git
            CORE_REPO=git@github.com:AI-Passione/famiglia-core.git
            APP_REPO=git@github.com:davnnis2003/la-passione.git

            ensure_repo() {
              REPO_URL="$1"
              REPO_DIR="$2"

              if [ ! -d "$REPO_DIR/.git" ]; then
                git clone "$REPO_URL" "$REPO_DIR"
              fi
            }

            sync_repo() {
              REPO_DIR="$1"

              cd "$REPO_DIR"
              git fetch origin "$DEPLOY_BRANCH"
              git checkout "$DEPLOY_BRANCH" || git checkout -b "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
              git pull --ff-only origin "$DEPLOY_BRANCH"
              cd "$STACK_ROOT"
            }

            sudo mkdir -p "$STACK_ROOT"
            sudo chown -R "$(id -un):$(id -gn)" "$STACK_ROOT"

            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
            chmod 600 ~/.ssh/known_hosts

            cd "$STACK_ROOT"

            ensure_repo "$DEMO_REPO" famiglia-demo
            ensure_repo "$CORE_REPO" famiglia-core
            ensure_repo "$APP_REPO" la-passione

            sync_repo famiglia-demo
            sync_repo famiglia-core
            sync_repo la-passione

            cd "$STACK_ROOT/famiglia-demo"

            if [ ! -f .env ]; then
              echo "Missing $STACK_ROOT/famiglia-demo/.env on the Hetzner host."
              exit 1
            fi

            docker compose pull || true
            docker compose up -d --build --remove-orphans
            docker compose ps
