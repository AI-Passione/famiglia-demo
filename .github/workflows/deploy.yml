name: Deploy Command Center to GH Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Demo Repo
        uses: actions/checkout@v4

      - name: Checkout Core Repo (Open Source)
        uses: actions/checkout@v4
        with:
          repository: AI-Passione/famiglia-core
          path: famiglia-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: famiglia-core/src/famiglia_core/command_center/frontend/package-lock.json

      - name: Inject Supabase Support
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          echo "Applying Supabase Patch..."
          patch -p1 < ../../../../../../supabase.patch
          echo "Copying Overlay Files..."
          cp ../../../../../../command_center_overlay/*.ts ./src/
          echo "Installing Supabase SDK..."
          npm install @supabase/supabase-js --save

      - name: Install Dependencies
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          npm ci

      - name: Build Frontend
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          # Set the base path for GitHub Pages subfolder deployment
          export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'famiglia-core/src/famiglia_core/command_center/frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
