name: Deploy (Release Pipeline)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    name: Run Safety Checks
    uses: ./.github/workflows/verify.yml

  build_and_deploy:
    name: Build & Deploy to GH Pages
    needs: verify
    runs-on: ubuntu-latest
    container: node:20
    steps:
      - name: Checkout Demo Repo
        uses: actions/checkout@v4

      - name: Checkout Core Repo
        uses: actions/checkout@v4
        with:
          repository: AI-Passione/famiglia-core
          path: famiglia-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: famiglia-core/src/famiglia_core/command_center/frontend/package-lock.json

      - name: Inject Supabase Support
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          echo "Applying Supabase Patch..."
          patch -p1 < ../../../../../supabase/supabase.patch
          
          echo "Copying Overlay Source files..."
          cp ../../../../../supabase/*.ts ./src/
          
          echo "Installing Dependencies (including Supabase)..."
          npm install
          npm install @supabase/supabase-js

      - name: Cleanup Unused Declarations
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          echo "Cleaning up unused code to satisfy TS strictness..."
          # Prefix unused setters/state in App.tsx with underscores (satisfies TS without breaking references)
          sed -i 's/selectedGraph,/_selectedGraph,/g' src/App.tsx
          sed -i 's/setRecurringTasks/_setRecurringTasks/g' src/App.tsx
          sed -i 's/setGraphs/_setGraphs/g' src/App.tsx
          sed -i 's/setSelectedGraph/_setSelectedGraph/g' src/App.tsx
          # Remove unused actions state and its fetcher from Operations.tsx
          sed -i '/const \[actions, setActions\]/d' src/modules/Operations.tsx
          sed -i 's/actionsData, //' src/modules/Operations.tsx
          sed -i 's/apiService.getActions(50), //' src/modules/Operations.tsx
          sed -i '/setActions(actionsData.actions)/d' src/modules/Operations.tsx

      - name: Build Frontend
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          
          echo "Creating Production Environment..."
          cat <<EOF > .env.production
          VITE_BASE_PATH=/${{ github.event.repository.name }}/
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF
          
          echo "Building with Base Path: /${{ github.event.repository.name }}/"
          npm run build -- --base=/${{ github.event.repository.name }}/


      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'famiglia-core/src/famiglia_core/command_center/frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
