name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Validate Deployment Config
    uses: ./.github/workflows/verify.yml

  deploy:
    name: Deploy over SSH
    needs: verify
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST || vars.HETZNER_HOST }}
      SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER || vars.HETZNER_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || vars.SSH_PORT || '22' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.HETZNER_SSH_PRIVATE_KEY }}
      SSH_PRIVATE_KEY_BASE64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 || secrets.HETZNER_SSH_PRIVATE_KEY_BASE64 }}
      SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE || secrets.HETZNER_SSH_PASSPHRASE }}

    steps:
      - name: Validate SSH configuration
        run: |
          test -n "$SSH_HOST" || {
            echo "::error::Missing SSH host. Set the SSH_HOST secret, or define SSH_HOST/HETZNER_HOST as a repository variable."
            exit 1
          }
          test -n "$SSH_USER" || {
            echo "::error::Missing SSH user. Set the SSH_USER secret, or define SSH_USER/HETZNER_USER as a repository variable."
            exit 1
          }
          test -n "$SSH_PRIVATE_KEY$SSH_PRIVATE_KEY_BASE64" || {
            echo "::error::Missing SSH private key. Set SSH_PRIVATE_KEY or SSH_PRIVATE_KEY_BASE64."
            exit 1
          }

      - name: Decode and prepare SSH key
        run: |
          KEY_FILE="${GITHUB_WORKSPACE}/.github/.deploy_key"
          mkdir -p "$(dirname "$KEY_FILE")"
          
          if [ -n "$SSH_PRIVATE_KEY_BASE64" ]; then
            printf '%s' "$SSH_PRIVATE_KEY_BASE64" | tr -d '\r\n\t ' | base64 --decode > "$KEY_FILE"
          elif [ -n "$SSH_PRIVATE_KEY" ]; then
            printf '%b' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$KEY_FILE"
          fi
          
          # Make readable by all (including Docker container)
          chmod 644 "$KEY_FILE"
          echo "SSH_KEY_FILE=${GITHUB_WORKSPACE}/.github/.deploy_key" >> "$GITHUB_ENV"

      - name: Deploy stack on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key_path: ${{ env.SSH_KEY_FILE }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          port: ${{ env.SSH_PORT || '22' }}
          script: |
            set -eu

            STACK_ROOT=/opt/famiglia
            DEPLOY_BRANCH=main
            DEMO_REPO=git@github.com:${{ github.repository }}.git
            CORE_REPO=git@github.com:AI-Passione/famiglia-core.git

            ensure_repo() {
              REPO_URL="$1"
              REPO_DIR="$2"

              if [ ! -d "$REPO_DIR/.git" ]; then
                git clone "$REPO_URL" "$REPO_DIR"
              fi
            }

            sync_repo() {
              REPO_DIR="$1"

              cd "$REPO_DIR"
              git fetch origin "$DEPLOY_BRANCH"
              git checkout "$DEPLOY_BRANCH" || git checkout -b "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
              git pull --ff-only origin "$DEPLOY_BRANCH"
              cd "$STACK_ROOT"
            }

            sudo mkdir -p "$STACK_ROOT"
            sudo chown -R "$(id -un):$(id -gn)" "$STACK_ROOT"

            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
            chmod 600 ~/.ssh/known_hosts

            cd "$STACK_ROOT"

            ensure_repo "$DEMO_REPO" famiglia-demo
            ensure_repo "$CORE_REPO" famiglia-core

            sync_repo famiglia-demo
            sync_repo famiglia-core

            cd "$STACK_ROOT/famiglia-demo"

            if [ ! -f .env ]; then
              echo "Missing $STACK_ROOT/famiglia-demo/.env on the Hetzner host."
              exit 1
            fi

            docker compose pull || true
            docker compose up -d --build --remove-orphans
            docker compose ps
