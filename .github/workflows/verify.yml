name: Verify

on:
  workflow_call:

jobs:
  deployment_config:
    name: Deployment Config Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Demo Repo
        uses: actions/checkout@v4
        with:
          path: famiglia-demo

      - name: Checkout Core Repo
        uses: actions/checkout@v4
        with:
          repository: AI-Passione/famiglia-core
          path: famiglia-core

      - name: Checkout App Repo
        uses: actions/checkout@v4
        with:
          repository: davnnis2003/la-passione
          path: la-passione

      - name: Prepare Environment
        run: |
          cp famiglia-demo/.env.example famiglia-demo/.env
          echo "DEV_CHANNEL_ID=ci" >> famiglia-demo/.env

      - name: Validate Docker Compose Stack
        working-directory: famiglia-demo
        run: docker compose config >/dev/null
