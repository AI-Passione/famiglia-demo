name: Verify

on:
  workflow_call:

jobs:
  workflow_linter:
    name: Workflow Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Download and Run actionlint
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  deployment_config:
    name: Deployment Config Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Demo Repo
        uses: actions/checkout@v4
        with:
          path: famiglia-demo

      - name: Checkout Core Repo
        uses: actions/checkout@v4
        with:
          repository: AI-Passione/famiglia-core
          path: famiglia-core

      - name: Prepare Environment
        run: |
          cp famiglia-demo/.env.example famiglia-demo/.env
          echo "DEV_CHANNEL_ID=ci" >> famiglia-demo/.env

      - name: Validate Docker Compose Stack
        working-directory: famiglia-demo
        run: docker compose config >/dev/null
