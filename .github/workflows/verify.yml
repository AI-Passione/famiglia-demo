name: Verify

on:
  workflow_call:

jobs:
  test:
    name: Supabase Logic Tests
    runs-on: ubuntu-latest
    container: node:20
    steps:
      - name: Checkout Demo Repo
        uses: actions/checkout@v4

      - name: Checkout Core Repo
        uses: actions/checkout@v4
        with:
          repository: AI-Passione/famiglia-core
          path: famiglia-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: famiglia-core/src/famiglia_core/command_center/frontend/package-lock.json

      - name: Inject Supabase Support
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          echo "Applying Supabase Patch..."
          patch -p1 < ../../../../../supabase/supabase.patch
          
          echo "Copying Overlay Source files..."
          cp ../../../../../supabase/*.ts ./src/
          
          echo "Copying Overlay Test files..."
          mkdir -p ../../../../tests/command_center/frontend/
          cp ../../../../../tests/*.spec.ts ../../../../tests/command_center/frontend/
          
          echo "Installing Supabase SDK..."
          npm install @supabase/supabase-js --save

      - name: Cleanup Unused Declarations
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          echo "Cleaning up unused code to satisfy TS strictness..."
          # Remove unused interfaces from App.tsx
          sed -i '/PaginatedTasks/d' src/App.tsx
          sed -i '/PaginatedActions/d' src/App.tsx
          # Prefix unused setters in App.tsx with underscores (satisfies TS without breaking references)
          sed -i 's/setRecurringTasks/_setRecurringTasks/g' src/App.tsx
          sed -i 's/setGraphs/_setGraphs/g' src/App.tsx
          sed -i 's/setSelectedGraph/_setSelectedGraph/g' src/App.tsx
          # Remove unused actions state and its fetcher from Operations.tsx
          sed -i '/const \[actions, setActions\]/d' src/modules/Operations.tsx
          sed -i 's/actionsData, //' src/modules/Operations.tsx
          sed -i 's/apiService.getActions(50), //' src/modules/Operations.tsx

      - name: Install Dependencies
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          npm ci

      - name: Type Check Frontend
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          npm run build

      - name: Run Supabase Logic Tests
        run: |
          cd famiglia-core/src/famiglia_core/command_center/frontend
          echo "Running Injected Supabase Logic Tests..."
          npx vitest run test_supabase_api_service.spec.ts
