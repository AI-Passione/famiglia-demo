events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip settings for premium performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml image/svg+xml;

    # DYNAMIC RESOLUTION (502 RESILIENCY)
    # This tells Nginx to use Docker's internal DNS and resolve names at request-time.
    # It prevents Nginx from crashing at startup if a container is initializing.
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;

        # Increase upload limit for files/images
        client_max_body_size 50M;

        # Frontend Routing (Resilient)
        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # For SPA routing
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # Backend API Routing (Resilient)
        location /api/ {
            set $backend http://app:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts for slow local LLM generation
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Backend API Documentation
        location /docs {
            set $backend_docs http://app:8000/docs;
            proxy_pass $backend_docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            set $openapi http://app:8000/openapi.json;
            proxy_pass $openapi;
            proxy_set_header Host $host;
        }

        # Grafana Monitoring (Resilient)
        location /grafana/ {
            set $monitoring http://grafana:3000;
            proxy_pass $monitoring/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
        }

        # Health Check for the Gateway itself
        location /gateway-health {
            access_log off;
            return 200 'online';
            add_header Content-Type text/plain;
        }
    }
}
