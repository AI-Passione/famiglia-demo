services:
  gateway:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - app

  frontend:
    image: ghcr.io/ai-passione/famiglia-core:production
    build:
      context: ../famiglia-core
      dockerfile: Dockerfile
    restart: always
    working_dir: /app/src/famiglia_core/command_center/frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "80"]
    expose:
      - "80"
    environment:
      - VITE_BACKEND_BASE=${VITE_BACKEND_BASE}
      - VITE_API_BASE=${VITE_API_BASE:-/api/v1}
    depends_on:
      - app

  app:
    image: ghcr.io/ai-passione/famiglia-core:production
    build:
      context: ../famiglia-core
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app/src
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-passione_admin}
      - DB_PASSWORD=${DB_PASSWORD:-passione_password}
      - DB_NAME=${DB_NAME:-passione_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_HOST=http://ollama:11434
      - APP_ENV=${APP_ENV}
      - DUCKDB_DWH_PATH=/app/data/duckdb_dwh.db
    depends_on:
      - postgres
      - redis
      - ollama

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${DB_USER:-passione_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-passione_password}
      - POSTGRES_DB=${DB_NAME:-passione_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../famiglia-core/src/famiglia_core/db/schema.sql:/docker-entrypoint-initdb.d/00_schema.sql
      - ../famiglia-core/src/famiglia_core/db/agents/souls.sql:/docker-entrypoint-initdb.d/01_souls.sql
      - ../famiglia-core/src/famiglia_core/db/agents/skills.sql:/docker-entrypoint-initdb.d/02_skills.sql
      - ../famiglia-core/src/famiglia_core/db/agents/tools.sql:/docker-entrypoint-initdb.d/03_tools.sql
      - ../famiglia-core/src/famiglia_core/db/agents/resources.sql:/docker-entrypoint-initdb.d/04_resources.sql
      - ../famiglia-core/src/famiglia_core/db/agents/workflows.sql:/docker-entrypoint-initdb.d/05_workflows.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-passione_admin} -d ${DB_NAME:-passione_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: always
    expose:
      - "11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  redis_data:
  postgres_data:
  ollama_data:
